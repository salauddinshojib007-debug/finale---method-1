<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus — Contact Us</title>

new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-KRJFNQC2');</script>
<!-- End Google Tag Manager -->

  <style>
    /* ── Tokens ── */
    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --border:     #2a2d3a;
      --accent:     #6c63ff;
      --accent-dim: #4c45c0;
      --text-1:     #f0f0f5;
      --text-2:     #9a9ab0;
      --success-bg: #0d2b20;
      --success-border: #1a9e6a;
      --success-text:   #34d399;
      --error:      #f87171;
      --radius:     10px;
      --transition: 0.2s ease;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Brand mark ── */
    .brand {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
    }

    .card-header { margin-bottom: 2rem; }

    .card-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 0.4rem;
    }

    .card-header p {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.5;
    }

    /* ── Form layout ── */
    #contact-us-form { display: flex; flex-direction: column; gap: 1.25rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-2);
      text-transform: uppercase;
    }

    label .required { color: var(--accent); margin-left: 2px; }

    input[type="text"],
    input[type="email"],
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-1);
      font-size: 0.95rem;
      padding: 0.7rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder { color: var(--text-2); }

    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
    }

    /* Custom select arrow */
    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: "";
      pointer-events: none;
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-top-color: var(--text-2);
      margin-top: 3px;
    }

    select option { background: var(--surface); }

    /* Inline pair */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* ── Submit button ── */
    .btn-submit {
      margin-top: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 0.85rem 1.5rem;
      cursor: pointer;
      width: 100%;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      position: relative;
    }

    .btn-submit:hover {
      background: var(--accent-dim);
      box-shadow: 0 8px 24px rgba(108,99,255,0.35);
    }

    .btn-submit:active { transform: scale(0.98); }

    .btn-submit:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── Success banner ── */
    #success-message {
      display: none;
      align-items: flex-start;
      gap: 0.75rem;
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      margin-top: 1rem;
    }

    #success-message.visible { display: flex; }

    .success-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      background: var(--success-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .success-icon svg { display: block; }

    .success-text strong {
      display: block;
      color: var(--success-text);
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
    }

    .success-text span {
      font-size: 0.82rem;
      color: var(--text-2);
    }

    /* ── Inline validation ── */
    .field-error {
      font-size: 0.78rem;
      color: var(--error);
      display: none;
    }
    .form-group.invalid .field-error { display: block; }
    .form-group.invalid input,
    .form-group.invalid select {
      border-color: var(--error);
    }

    /* ── Footer note ── */
    .privacy-note {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-2);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .card { padding: 2rem 1.25rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>

<body>

  <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KRJFNQC2"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

  <span class="brand">Nexus</span>

  <div class="card">
    <div class="card-header">
      <h1>Get in touch</h1>
      <p>We'll get back to you within one business day.</p>
    </div>

    <!--
      ================================================================
      GTM TRACKING HOOKS — QUICK REFERENCE
      ================================================================
      Form element      → id="contact-us-form"
      First name field  → id="field-first-name"  name="first_name"
      Last name field   → id="field-last-name"   name="last_name"
      Email field       → id="field-email"        name="email"
      Dropdown          → id="field-department"   name="department"
      Submit button     → class="btn-submit"       id="btn-submit"
      Success banner    → id="success-message"

      Suggested GTM Trigger:
        Trigger Type  → Form Submission
        Fire On       → Forms matching  Form ID  equals  contact-us-form
      ================================================================
    -->
    <form
      id="contact-us-form"
      name="contact_us"
      class="contact-form"
      novalidate
    >

      <!-- Row 1: Name (split) -->
      <div class="form-row">
        <div class="form-group" id="group-first-name">
          <label for="field-first-name">
            First name <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            id="field-first-name"
            name="first_name"
            class="form-input"
            placeholder="Ada"
            autocomplete="given-name"
            required
          />
          <span class="field-error" role="alert">Please enter your first name.</span>
        </div>

        <div class="form-group" id="group-last-name">
          <label for="field-last-name">
            Last name <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            id="field-last-name"
            name="last_name"
            class="form-input"
            placeholder="Lovelace"
            autocomplete="family-name"
            required
          />
          <span class="field-error" role="alert">Please enter your last name.</span>
        </div>
      </div>

      <!-- Row 2: Email -->
      <div class="form-group" id="group-email">
        <label for="field-email">
          Email address <span class="required" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="field-email"
          name="email"
          class="form-input"
          placeholder="ada@example.com"
          autocomplete="email"
          required
        />
        <span class="field-error" role="alert">Please enter a valid email address.</span>
      </div>

      <!-- Row 3: Department dropdown -->
      <div class="form-group" id="group-department">
        <label for="field-department">
          Department <span class="required" aria-hidden="true">*</span>
        </label>
        <div class="select-wrapper">
          <select
            id="field-department"
            name="department"
            class="form-input form-select"
            required
          >
            <option value="" disabled selected>Select a department…</option>
            <option value="sales">Sales</option>
            <option value="support">Technical Support</option>
            <option value="billing">Billing</option>
            <option value="partnerships">Partnerships</option>
            <option value="other">Other</option>
          </select>
        </div>
        <span class="field-error" role="alert">Please select a department.</span>
      </div>

      <!-- Row 4: Submit -->
      <button
        type="submit"
        id="btn-submit"
        class="btn-submit"
        data-track="contact-form-submit"
      >
        Send message
      </button>

    </form>

    <!-- Success banner — shown by JS after submit; no page reload -->
    <div id="success-message" role="status" aria-live="polite">
      <div class="success-icon" aria-hidden="true">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 4L4.2 7.5L10 1" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="success-text">
        <strong>Message sent!</strong>
        <span>Thanks — we'll be in touch shortly.</span>
      </div>
    </div>

    <p class="privacy-note">We respect your privacy. No spam, ever.</p>
  </div>

  <script>
    /*
    ================================================================
    FORM SUBMISSION HANDLER
    ================================================================
    What this does:
      1. Validates each required field; marks invalid groups visually.
      2. If valid, prevents the default hard page reload (so GTM
         Preview Mode stays open and its debug history is preserved).
      3. Shows the #success-message banner in-place.
      4. Dispatches a custom event ("formSuccess") that you can use
         as an additional GTM trigger (Custom Event → formSuccess).
    ================================================================
    */
    (function () {
      var form    = document.getElementById('contact-us-form');
      var success = document.getElementById('success-message');

      /* ── Validation helpers ── */
      function markGroup(groupId, isValid) {
        var g = document.getElementById(groupId);
        if (!g) return;
        if (isValid) {
          g.classList.remove('invalid');
        } else {
          g.classList.add('invalid');
        }
      }

      function validateForm() {
        var firstName  = document.getElementById('field-first-name').value.trim();
        var lastName   = document.getElementById('field-last-name').value.trim();
        var email      = document.getElementById('field-email').value.trim();
        var department = document.getElementById('field-department').value;
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        var valid = true;

        markGroup('group-first-name', firstName !== '');
        markGroup('group-last-name',  lastName  !== '');
        markGroup('group-email',      emailRegex.test(email));
        markGroup('group-department', department !== '');

        if (!firstName)                valid = false;
        if (!lastName)                 valid = false;
        if (!emailRegex.test(email))   valid = false;
        if (!department)               valid = false;

        return valid;
      }

      /* ── Submit handler ── */
      form.addEventListener('submit', function (event) {
        /*
          preventDefault() stops the browser from navigating away,
          which would reset the GTM Preview Mode debug history.
          GTM's own listener fires BEFORE this, so the dataLayer
          'gtm.formSubmit' event is still captured correctly.
        */
        event.preventDefault();

        if (!validateForm()) return;

        /* Show success banner */
        success.classList.add('visible');

        /* Scroll banner into view on small screens */
        success.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        /* Disable the submit button to prevent double-submission */
        var btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.textContent = 'Sent ✓';

        /*
          Optional: fire a custom GTM event.
          In GTM, create a Trigger: Trigger Type = Custom Event,
          Event Name = formSuccess  (no wildcards needed).
          Then attach it to any tag you want to fire on success.
        */
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
          event:          'formSuccess',
          formId:         'contact-us-form',
          formName:       'contact_us',
          userEmail:      document.getElementById('field-email').value.trim(),
          userDepartment: document.getElementById('field-department').value
        });
      });

      /* Clear invalid state on input */
      ['field-first-name', 'field-last-name', 'field-email', 'field-department'].forEach(function (id) {
        var el = document.getElementById(id);
        el.addEventListener('input', function () {
          var group = el.closest('.form-group');
          if (group) group.classList.remove('invalid');
        });
      });
    })();
  </script>

</body>
</html>
